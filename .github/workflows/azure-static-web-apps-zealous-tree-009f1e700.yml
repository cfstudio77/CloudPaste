name: Azure Static Web Apps CI/CD (CloudPaste)

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
  workflow_dispatch:
    inputs:
      from_panel:
        description: "是否由部署控制面板触发"
        required: false
        default: "false"

jobs:
  # 检查开关逻辑 (保留你原来的 check-config)
  check-config:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          # 允许手动触发或根据变量检查
          FRONTEND_ENABLED="${{ vars.FRONTEND_DEPLOY }}"
          [ -z "$FRONTEND_ENABLED" ] && FRONTEND_ENABLED="true"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$FRONTEND_ENABLED" == "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  # 部署到 Azure
  deploy:
    needs: check-config
    if: needs.check-config.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        # --- 核心修改：在构建时注入后端地址 ---
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        # ------------------------------------
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_TREE_009F1E700 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend" 
          api_location: "" 
          output_location: "dist" 

  # 关闭 PR 清理环境
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_TREE_009F1E700 }}
          action: "close"
